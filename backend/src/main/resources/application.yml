spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/karo_db
    username: ${DB_USERNAME:karo}
    password: ${DB_PASSWORD:karo_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema, Hibernate validates only
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

karo:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-replace-in-production-env}
    access-token-expiry: 900000       # 15 minutes
    refresh-token-expiry: 604800000   # 7 days

server:
  port: 8080

logging:
  level:
    com.karo: DEBUG
    org.springframework.security: INFO